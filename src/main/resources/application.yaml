server:
  port: 8080

spring:
  application:
    name: api-orders

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # USAR ESTA LÍNEA PARA PRUEBAS LOCALES (IDE / JMeter con mvn spring-boot:run)
    url: jdbc:mysql://localhost:3309/api_orders_prod?serverTimezone=America/Lima&useSSL=false&allowPublicKeyRetrieval=true

    # CAMBIAR A ESTA LÍNEA CUANDO SE EJECUTE EN DOCKER (Se comenta con # la de arriba y se desmarca esta)
    # url: jdbc:mysql://db/api_orders_prod?serverTimezone=America/Lima&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 'admin123'

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.sql: debug