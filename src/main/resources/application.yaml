server:
  port: 8080

spring:
  application:
    name: api-orders

  # ✅ CONFIGURACIÓN H2: Base de datos en memoria para Local y Docker
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ordersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password

  jpa:
    # Cambiado al dialecto correcto de H2
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 🖥️ Consola web de H2 para que puedas revisar tus tablas en el navegador
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.sql: debug