version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-orders-prod
    restart: always
    environment:
      MYSQL_DATABASE: 'api_orders_prod'
      MYSQL_ROOT_PASSWORD: 'admin123'
      MYSQL_PASSWORD: 'admin123'
    volumes:
      - mysql_orders_data:/var/lib/mysql
      # Mapea tu carpeta de scripts SQL para inicializar la base de datos si es necesario
      - ../sql:/docker-entrypoint-initdb.d/
    ports:
      - '3309:3306'
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin123"]
      timeout: 20s
      retries: 10
      start_period: 40s
    networks:
      - orders_net

  app:
    build:
      context: ..  # Contexto en la raíz del proyecto api-orders/
      dockerfile: docker/Dockerfile # Busca tu Dockerfile dentro de la carpeta docker/
    container_name: api_orders_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080' # Puerto 8080 que es el que usa tu app de órdenes por defecto
    environment:
      # URL apuntando al contenedor 'db' y usando la nueva base de datos
      SPRING_DATASOURCE_URL: jdbc:mysql://db/api_orders_prod?serverTimezone=America/Lima&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    restart: unless-stopped
    networks:
      - orders_net

volumes:
  mysql_orders_data: # Volumen específico para no mezclar los datos con otros proyectos

networks:
  orders_net:
    name: api_orders_network # Nombre físico de la red Docker para este microservicio